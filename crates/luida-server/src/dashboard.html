<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🍺 루이다</title>
<style>
  :root {
    --bg: #0e1626; --panel: #15203a; --line: #243450; --gold: #FCD34D;
    --dim: #8AA0C0; --green: #4ADE80; --red: #F87171; --orange: #FFA500; --text: #E6EDF7;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
  header { display: flex; align-items: center; gap: 12px; padding: 12px 18px;
    border-bottom: 1px solid var(--line); }
  header h1 { font-size: 18px; margin: 0; color: var(--gold); }
  #conn { font-size: 11px; color: var(--dim); }
  #conn.live { color: var(--green); }
  .new { display: flex; gap: 8px; padding: 12px 18px; border-bottom: 1px solid var(--line); }
  .new textarea { flex: 1; min-height: 38px; max-height: 160px; resize: vertical;
    background: var(--panel); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 8px; font: inherit; }
  button { background: var(--panel); color: var(--gold); border: 1px solid var(--gold);
    border-radius: 6px; padding: 6px 12px; cursor: pointer; font: inherit; white-space: nowrap; }
  button:hover { background: var(--gold); color: #000; }
  button.sm { font-size: 12px; padding: 3px 8px; }
  main { display: grid; grid-template-columns: 1fr 1.3fr 1.6fr 1.3fr; gap: 1px;
    background: var(--line); }
  .col { background: var(--bg); padding: 12px; min-height: 60vh; }
  .col h2 { font-size: 13px; color: var(--gold); margin: 0 0 10px; text-transform: uppercase;
    letter-spacing: .5px; }
  .item { background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    padding: 8px 10px; margin-bottom: 8px; }
  .item .row { display: flex; align-items: center; gap: 8px; }
  .item .title { color: var(--green); font-weight: 600; }
  .item .meta { color: var(--dim); font-size: 12px; }
  .spacer { flex: 1; }
  .badge { font-size: 11px; padding: 1px 7px; border-radius: 10px; }
  .st-completed { color: var(--green); } .st-failed, .st-aborted { color: var(--red); }
  .st-needs_input, .st-needs_approval { color: var(--orange); }
  .st-running, .st-reviewing, .st-planning { color: var(--gold); }
  .empty { color: var(--dim); font-size: 12px; }
  .bar { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; margin-top: 6px; }
  .bar > i { display: block; height: 100%; background: var(--green); }
  #toast { position: fixed; right: 16px; bottom: 16px; display: flex; flex-direction: column;
    gap: 8px; z-index: 50; }
  .toast { background: var(--panel); border: 1px solid var(--green); color: var(--text);
    padding: 8px 12px; border-radius: 8px; max-width: 360px; box-shadow: 0 4px 16px #0008; }
  .toast.err { border-color: var(--red); }
</style>
</head>
<body>
  <header>
    <h1>🍺 루이다</h1>
    <span id="conn">● 연결 중…</span>
    <span class="spacer"></span>
    <span class="meta" id="taken"></span>
  </header>

  <div class="new">
    <textarea id="prompt" placeholder="새 원정 프롬프트 — 예: agora와 admin에 통합 검색 필터를 추가해줘 (Shift+Enter 개행, Enter 계획)"></textarea>
    <button onclick="plan()">📋 원정 계획</button>
  </div>

  <main>
    <div class="col"><h2>모험지</h2><div id="projects"></div></div>
    <div class="col"><h2>원정</h2><div id="campaigns"></div></div>
    <div class="col"><h2>모험</h2><div id="quests"></div></div>
    <div class="col"><h2>주점 게시판</h2><div id="inmail"></div></div>
  </main>

  <div id="toast"></div>

<script>
let snap = { projects: [], campaigns: [], quests: [], inmail: [] };

const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

function toast(msg, err) {
  const box = document.getElementById("toast");
  const el = document.createElement("div");
  el.className = "toast" + (err ? " err" : "");
  el.textContent = msg;
  box.appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

async function api(method, url, body) {
  const res = await fetch(url, {
    method,
    headers: body ? { "content-type": "application/json" } : undefined,
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
  return data;
}

async function plan() {
  const ta = document.getElementById("prompt");
  const prompt = ta.value.trim();
  if (!prompt) return;
  try {
    const r = await api("POST", "/api/campaigns/plan", { prompt });
    toast("📋 원정 #" + r.campaign_id + " 계획 완료");
    ta.value = "";
  } catch (e) { toast("계획 실패: " + e.message, true); }
}

async function run(id) {
  toast("⚔ 원정 #" + id + " 실행 중…");
  try {
    const r = await api("POST", "/api/campaigns/" + id + "/run");
    toast("✅ 원정 #" + id + " — 완료 " + r.completed + " / 대기 " + r.needs_input + " / 실패 " + r.failed);
  } catch (e) { toast("실행 실패: " + e.message, true); }
}

async function resume(id) {
  const answer = window.prompt("모험 q" + id + " 재개 — 답변:");
  if (answer == null || !answer.trim()) return;
  try {
    await api("POST", "/api/quests/" + id + "/resume", { answer });
    toast("⚔ q" + id + " 재개됨");
  } catch (e) { toast("재개 실패: " + e.message, true); }
}

async function triage(id) {
  try {
    const d = await api("POST", "/api/quests/" + id + "/triage");
    toast("🔎 q" + id + " — 사용자필요 " + (d.ask_user ? "예" : "아니오") + " · " + d.reason);
  } catch (e) { toast("triage 실패: " + e.message, true); }
}

function stBadge(s) { return '<span class="badge st-' + esc(s) + '">' + esc(s) + "</span>"; }

function render() {
  // 모험지
  document.getElementById("projects").innerHTML = snap.projects.length
    ? snap.projects.map((p) =>
        '<div class="item"><div class="row"><span class="title">' + esc(p.name) +
        '</span><span class="spacer"></span><span class="meta">' + esc(p.base_branch) +
        '</span></div><div class="meta">' + esc(p.repo_path) + "</div></div>").join("")
    : '<div class="empty">등록된 모험지가 없습니다.</div>';

  // 원정 — quests 로 진행도 집계 (active 기준)
  const byCamp = {};
  for (const q of snap.quests) {
    const k = q.campaign_id;
    (byCamp[k] = byCamp[k] || []).push(q);
  }
  document.getElementById("campaigns").innerHTML = snap.campaigns.length
    ? snap.campaigns.map((c) => {
        const qs = byCamp[c.id] || [];
        const done = qs.filter((q) => q.status === "completed").length;
        const ratio = qs.length ? Math.round((done / qs.length) * 100) : 0;
        return '<div class="item"><div class="row"><span class="meta">#' + c.id +
          "</span> " + stBadge(c.status) +
          '<span class="title">' + esc(c.title) +
          '</span><span class="spacer"></span><button class="sm" onclick="run(' + c.id +
          ')">⚔ 실행</button></div>' +
          (qs.length ? '<div class="meta">' + done + "/" + qs.length +
            ' 완료</div><div class="bar"><i style="width:' + ratio + '%"></i></div>' : "") +
          "</div>";
      }).join("")
    : '<div class="empty">진행 중인 원정이 없습니다. 위에서 새 원정을 계획하세요.</div>';

  // 모험
  document.getElementById("quests").innerHTML = snap.quests.length
    ? snap.quests.map((q) => {
        const ni = q.status === "needs_input" || q.status === "needs_approval";
        const btns = ni
          ? '<button class="sm" onclick="resume(' + q.id + ')">↻ 재개</button>' +
            '<button class="sm" onclick="triage(' + q.id + ')">🔎 triage</button>'
          : "";
        return '<div class="item"><div class="row"><span class="meta">q' + q.id + "</span> " +
          stBadge(q.status) + '<span class="meta">' + esc(q.project) +
          '</span><span class="spacer"></span>' + btns + "</div>" +
          '<div class="meta">' + esc(q.progress || q.brief) + "</div></div>";
      }).join("")
    : '<div class="empty">진행 중인 모험이 없습니다.</div>';

  // 주점 게시판 (inmail)
  document.getElementById("inmail").innerHTML = snap.inmail && snap.inmail.length
    ? snap.inmail.slice(0, 30).map((m) =>
        '<div class="item"><div class="row"><span class="title">' + esc(m.kind) +
        '</span><span class="meta">' + esc(m.from_session) + " → " + esc(m.to_session) +
        '</span></div><div class="meta">' + esc(String(m.payload).slice(0, 120)) + "</div></div>").join("")
    : '<div class="empty">메시지가 없습니다.</div>';
}

function apply(data) {
  if (data && !data.error) {
    snap = data;
    const t = new Date(data.taken_at || Date.now());
    document.getElementById("taken").textContent = t.toLocaleTimeString("ko-KR");
    render();
  }
}

function connect() {
  fetch("/api/snapshot").then((r) => r.json()).then(apply).catch(() => {});
  const es = new EventSource("/api/stream");
  const conn = document.getElementById("conn");
  es.onopen = () => { conn.textContent = "● LIVE"; conn.className = "live"; };
  es.onmessage = (ev) => { try { apply(JSON.parse(ev.data)); } catch {} };
  es.onerror = () => { conn.textContent = "● 재연결 중…"; conn.className = ""; };
}

// Enter=계획, Shift+Enter=개행
document.getElementById("prompt").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); plan(); }
});

connect();
</script>
</body>
</html>
