[package]
name = "luida-tauri"
version = "0.0.0"
description = "Luida desktop wrapper"
authors = ["roto <roto@daangn.com>"]
license = ""
edition = "2021"

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
tauri = { version = "2.0", features = [] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
